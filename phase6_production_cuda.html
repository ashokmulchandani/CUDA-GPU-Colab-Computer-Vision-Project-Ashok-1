<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 6: Production CUDA — Interactive Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090f; --bg-card: #0d1117; --bg-raised: #161b22;
  --border: #21262d; --border-active: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --text-muted: #484f58;
  --cyan: #39d2ff; --cyan-bg: #39d2ff15; --cyan-border: #39d2ff40;
  --amber: #ffb347; --amber-bg: #ffb34715;
  --green: #3fb950; --green-bg: #3fb95015;
  --magenta: #ff6ec7; --magenta-bg: #ff6ec715;
  --red: #f85149; --violet: #a371f7;
  --radius: 14px; --radius-sm: 8px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
body.light {
  --bg: #f6f8fa; --bg-card: #ffffff; --bg-raised: #e8ecf0;
  --border: #d0d7de; --border-active: #afb8c1;
  --text: #1f2328; --text-dim: #656d76; --text-muted: #8b949e;
  --cyan: #0969da; --cyan-bg: #ddf4ff; --cyan-border: #54aeff;
  --amber: #9a6700; --amber-bg: #fff8c5;
  --green: #1a7f37; --green-bg: #dafbe1;
  --magenta: #bf3989; --magenta-bg: #fbefff;
  --red: #cf222e; --violet: #8250df;
}
body.light .topbar { background: rgba(246,248,250,0.9); }
body.light .eq-box { background: rgba(0,0,0,0.03); }

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  overflow-x: hidden; line-height: 1.65;
  transition: background 0.3s, color 0.3s;
}
.bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
.app { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:2rem; }

.theme-toggle {
  position: fixed; top: 0.7rem; right: 2rem; z-index: 200;
  background: var(--bg-raised); border: 1px solid var(--border);
  color: var(--text); font-size: 1.1rem; cursor: pointer;
  padding: 0.35rem 0.6rem; border-radius: 6px;
  transition: var(--transition);
  font-family: 'JetBrains Mono', monospace;
}
.theme-toggle:hover { border-color: var(--cyan); color: var(--cyan); }

.topbar {
  position: sticky; top:0; z-index:100;
  background: rgba(6,9,15,0.85); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 2rem; display: flex; align-items: center; gap: 1rem; font-size: 0.8rem;
}
.topbar .logo { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--cyan); white-space: nowrap; }
.topbar .step-dots { display: flex; gap: 0.4rem; flex:1; justify-content: center; }
.topbar .step-dot { width: 28px; height: 4px; border-radius: 2px; background: var(--border); transition: var(--transition); cursor: pointer; }
.topbar .step-dot.done { background: var(--green); }
.topbar .step-dot.active { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
.topbar .step-dot:hover { background: var(--text-dim); }
.topbar .step-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; }

.header { text-align: center; padding: 3rem 0 1rem; }
.header .phase-badge { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; color: var(--green); border: 1px solid var(--green-bg); border-radius: 100px; padding: 0.4em 1.4em; margin-bottom: 1rem; }
.header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.6rem, 4vw, 2.6rem); font-weight: 700; background: linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
.header .tagline { color: var(--text-dim); font-size: 1rem; }

.topic-list { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; margin: 1.5rem 0 1rem; }
.topic-chip { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.04em; padding: 0.3rem 0.7rem; border-radius: 100px; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; transition: var(--transition); background: transparent; }
.topic-chip.visited { border-color: var(--green); color: var(--green); background: var(--green-bg); }
.topic-chip.current { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-bg); box-shadow: 0 0 10px var(--cyan-border); }
.topic-chip:hover { border-color: var(--text-dim); color: var(--text-dim); }

.fun-fact { background: linear-gradient(135deg, var(--amber-bg), var(--magenta-bg)); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.65rem 1.2rem; margin-bottom: 1.5rem; font-size: 0.78rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.6rem; }
.fun-fact .bulb { font-size: 1.2rem; flex-shrink: 0; }
.fun-fact strong { color: var(--amber); }

.slide { animation: slideIn 0.35s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
.card h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text); }
.card h2 .num { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--cyan); background: var(--cyan-bg); border-radius: 6px; padding: 0.2em 0.6em; }
.card p { color: var(--text-dim); margin-bottom: 1rem; font-size: 0.95rem; }
.card h3 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--cyan); margin: 1.2rem 0 0.5rem; }
.card ul, .card ol { color: var(--text-dim); padding-left: 1.5rem; margin-bottom: 1rem; font-size: 0.9rem; }
.card ul li, .card ol li { margin-bottom: 0.4rem; }

.eq-box { background: rgba(0,0,0,0.4); border-left: 3px solid var(--cyan); border-radius: var(--radius-sm); padding: 1.2rem 1.5rem; margin: 1rem 0; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.8; color: var(--text); white-space: pre-wrap; overflow-x: auto; }

.compare-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin: 1rem 0; }
.compare-grid.two-col { grid-template-columns: 1fr 1fr; }
.compare-card { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1.2rem; transition: var(--transition); }
.compare-card:hover { transform: translateY(-3px); border-color: var(--border-active); }
.compare-card.pick-a { border-left: 3px solid var(--red); }
.compare-card.pick-b { border-left: 3px solid var(--cyan); }
.compare-card.pick-c { border-left: 3px solid var(--green); }
.compare-card h4 { font-family: 'Orbitron', sans-serif; font-size: 0.78rem; margin-bottom: 0.5rem; }
.compare-card.pick-a h4 { color: var(--red); }
.compare-card.pick-b h4 { color: var(--cyan); }
.compare-card.pick-c h4 { color: var(--green); }
.compare-card p { font-size: 0.82rem !important; color: var(--text-dim) !important; }
.compare-card .tag-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
.compare-card .tag { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 0.2em 0.6em; border-radius: 100px; }
.tag.low { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.tag.med { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }
.tag.high { background: #f8514920; color: var(--red); border: 1px solid var(--red); }

.pipeline { display: flex; align-items: center; gap: 0.6rem; justify-content: center; flex-wrap: wrap; margin: 1.2rem 0; }
.pipeline-stage { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.8rem 1rem; text-align: center; transition: var(--transition); min-width: 100px; }
.pipeline-stage.highlight { border-color: var(--cyan); background: var(--cyan-bg); }
.pipeline-stage .stage-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
.pipeline-stage .stage-name { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; color: var(--cyan); line-height: 1.3; }
.pipeline-stage .stage-desc { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.2rem; }
.pipeline-arrow { font-size: 1.4rem; color: var(--cyan); animation: arrowPulse 1.5s ease-in-out infinite; }
@keyframes arrowPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.data-types { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin: 1rem 0; }
.data-types.two { grid-template-columns: repeat(2, 1fr); }
.data-type-card { background: var(--bg-raised); border: 1px solid var(--border); border-top: 3px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; transition: var(--transition); cursor: default; }
.data-type-card:nth-child(1) { border-top-color: var(--cyan); }
.data-type-card:nth-child(2) { border-top-color: var(--amber); }
.data-type-card:nth-child(3) { border-top-color: var(--magenta); }
.data-type-card:nth-child(4) { border-top-color: var(--green); }
.data-type-card:nth-child(5) { border-top-color: var(--violet); }
.data-type-card:nth-child(6) { border-top-color: var(--red); }
.data-type-card:hover { transform: translateY(-3px); border-color: var(--border-active); }
.data-type-card .dt-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
.data-type-card h4 { font-family: 'Orbitron', sans-serif; font-size: 0.78rem; margin-bottom: 0.3rem; color: var(--cyan); }
.data-type-card p { font-size: 0.78rem !important; color: var(--text-muted) !important; margin-bottom: 0 !important; }

.ladder { display: flex; flex-direction: column; gap: 0.5rem; margin: 1rem 0; }
.ladder-rung { display: flex; align-items: center; gap: 0.8rem; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.7rem 1rem; transition: var(--transition); }
.ladder-rung:hover { border-color: var(--cyan); }
.ladder-rung .rung-icon { font-size: 1.3rem; flex-shrink: 0; }
.ladder-rung .rung-bar { width: 6px; height: 36px; border-radius: 3px; flex-shrink: 0; }
.ladder-rung .rung-label { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text); min-width: 90px; }
.ladder-rung .rung-metric { font-family: 'Orbitron', sans-serif; font-size: 0.72rem; color: var(--cyan); flex: 1; }
.ladder-rung .rung-example { font-size: 0.72rem; color: var(--text-muted); }

.checklist { margin: 1rem 0; }
.checklist .check-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: var(--text-dim); }
.checklist .check-box { font-size: 1rem; flex-shrink: 0; }

.flashcard-wrap { perspective: 800px; margin: 1rem 0; cursor: pointer; }
.flashcard { position: relative; width: 100%; min-height: 90px; transform-style: preserve-3d; transition: transform 0.5s; }
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard .front, .flashcard .back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1rem; }
.flashcard .front { background: var(--bg-raised); border: 1px solid var(--border); font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--cyan); }
.flashcard .front .hint { font-family: 'DM Sans', sans-serif; font-size: 0.7rem; color: var(--text-muted); margin-top: 0.4rem; }
.flashcard .back { background: var(--bg-raised); border: 1px solid var(--cyan); transform: rotateY(180deg); color: var(--text-dim); font-size: 0.85rem; text-align: center; }

.big-stat { text-align: center; margin: 1rem 0; }
.big-stat .number { font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 700; background: linear-gradient(135deg, var(--cyan), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.big-stat .label { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }

.quiz { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1.2rem; margin-top: 1.5rem; }
.quiz .question { font-family: 'Orbitron', sans-serif; font-size: 0.82rem; color: var(--text); margin-bottom: 0.8rem; }
.quiz .options { display: flex; flex-direction: column; gap: 0.4rem; }
.quiz .option { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 1rem; font-size: 0.82rem; color: var(--text-dim); cursor: pointer; transition: var(--transition); }
.quiz .option:hover { border-color: var(--cyan); color: var(--cyan); }
.quiz .option.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.quiz .option.wrong { border-color: var(--red); background: #f8514920; color: var(--red); }
.quiz .feedback { display: none; margin-top: 0.8rem; padding: 0.6rem 1rem; border-radius: 6px; font-size: 0.82rem; }
.quiz .feedback.show { display: block; }
.quiz .feedback.correct { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.quiz .feedback.wrong { background: #f8514920; color: var(--red); border: 1px solid var(--red); }

.nav-row { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
.nav-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; padding: 0.6rem 1.8rem; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: var(--transition); }
.nav-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn.primary { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-bg); }

@media (max-width: 768px) {
  .app { padding: 1rem; } .topbar { padding: 0.5rem 1rem; }
  .compare-grid { grid-template-columns: 1fr; } .data-types { grid-template-columns: 1fr; }
  .pipeline { flex-direction: column; } .pipeline-arrow { transform: rotate(90deg); }
  .header h1 { font-size: 1.3rem; } .card { padding: 1.2rem; }
  .theme-toggle { right: 0.5rem; top: 0.5rem; font-size: 0.9rem; padding: 0.3rem 0.5rem; }
  .big-stat .number { font-size: 2rem; }
}
</style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>
<button class="theme-toggle" id="themeToggle" title="Toggle light/dark theme" onclick="toggleTheme()">☀️</button>

<nav class="topbar">
  <span class="logo">CUDA — PHASE 6</span>
  <div class="step-dots" id="stepDots"></div>
  <span class="step-label" id="stepLabel">1/10</span>
</nav>

<div class="app">
  <header class="header">
    <div class="phase-badge">✅ COMPLETED — 7× Multi-Stream, TensorRT, Triton</div>
    <h1>Phase 6: Production CUDA</h1>
    <p class="tagline">From "it works in Colab" to "it runs 24/7 in production" — TensorRT, Triton, Nsight profiling, multi-stream async, and cloud deployment</p>
  </header>

  <div class="topic-list" id="topicChips"></div>

  <div class="fun-fact" id="funFact">
    <span class="bulb">💡</span>
    <span class="fact-text" id="funFactText"></span>
  </div>

  <div id="slideContainer"></div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="goTo(currentSlide-1)">← Previous</button>
    <button class="nav-btn primary" id="nextBtn" onclick="goTo(currentSlide+1)">Next →</button>
  </div>
</div>

<script>
// ── Theme ──
function toggleTheme() {
  document.body.classList.toggle('light');
  const btn = document.getElementById('themeToggle');
  btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
  localStorage.setItem('cuda-phase6-theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
(function() {
  if (localStorage.getItem('cuda-phase6-theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = '🌙';
  }
})();

// ── Particles ──
(function() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (let i = 0; i < 60; i++) {
    particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, r: Math.random() * 2 + 0.5 });
  }
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const isLight = document.body.classList.contains('light');
    const lineColor = isLight ? 'rgba(9,105,218,0.06)' : 'rgba(57,210,255,0.06)';
    const dotColor = isLight ? 'rgba(9,105,218,0.3)' : 'rgba(57,210,255,0.3)';
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; });
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
        if (Math.sqrt(dx*dx + dy*dy) < 100) { ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.strokeStyle = lineColor; ctx.lineWidth = 0.5; ctx.stroke(); }
      }
    }
    particles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = dotColor; ctx.fill(); });
    requestAnimationFrame(animate);
  }
  animate();
})();

// ── Slides ──
const slides = [
  // ═══════ SLIDE 1: Phase 6 Overview ═══════
  {
    id: '6.0',
    title: 'Phase 6 Overview — The 6 Pillars',
    fact: '<strong>90% of GPU code never reaches production.</strong> The difference between a Colab notebook and a production system is these 6 pillars: optimization, serving, profiling, async execution, custom kernels, and infrastructure.',
    render() { return `
<div class="slide"><div class="card">
  <h2><span class="num">6.0</span> Phase 6 Overview — The 6 Pillars of Production CUDA</h2>
  <p>Writing a CUDA kernel that works is Phase 1-3. <strong style="color:var(--cyan)">Making it run 24/7 at scale, with monitoring, auto-scaling, and optimal performance</strong> — that's Phase 6. Each pillar addresses a different production concern.</p>

  <div class="data-types two">
    <div class="data-type-card"><div class="dt-icon">🚀</div><h4>6A: TensorRT</h4><p>Graph optimization, layer fusion, FP16/INT8 precision, kernel auto-tuning. Turns your PyTorch model into a production engine.</p></div>
    <div class="data-type-card"><div class="dt-icon">🖥️</div><h4>6B: Triton Server</h4><p>Model repository, HTTP/gRPC API, dynamic batching, A/B testing. Serves multiple models on one GPU.</p></div>
    <div class="data-type-card"><div class="dt-icon">🔍</div><h4>6C: Nsight Profiling</h4><p>Nsight Systems (timeline), Nsight Compute (kernel deep-dive), roofline model. Find the bottleneck, fix it, measure again.</p></div>
    <div class="data-type-card"><div class="dt-icon">⚡</div><h4>6D: Multi-Stream</h4><p>Async execution, overlapping transfer+compute, CUDA Graphs. 7× speedup by keeping the GPU never idle.</p></div>
    <div class="data-type-card"><div class="dt-icon">🔧</div><h4>6E: Custom Kernels</h4><p>Preprocess, NMS, pybind11 Python bindings. Custom CUDA integrated into the production pipeline.</p></div>
    <div class="data-type-card"><div class="dt-icon">☁️</div><h4>6F: Deployment</h4><p>Docker+CUDA, K8s, auto-scaling, spot instances, CloudWatch/Grafana. The infrastructure that keeps it running.</p></div>
  </div>

  <h3>🧠 The Production Mindset Shift</h3>
  <div class="compare-grid two-col">
    <div class="compare-card pick-a"><h4>🔴 Colab/Research</h4><p>"It got 95% accuracy on my test set!"</p><p style="color:var(--text-muted);margin-top:0.5rem">Single image, no latency target, no monitoring, manual restart if it crashes.</p></div>
    <div class="compare-card pick-c"><h4>🟢 Production</h4><p>"It serves 1000 requests/sec at p99 < 50ms, auto-scales at 80% GPU util, and has never dropped a request in 30 days."</p></div>
  </div>

  <div class="quiz" id="quiz0"><div class="question">🧪 What's the #1 reason ML models fail in production?</div>
  <div class="options">
    <div class="option" onclick="checkQuiz('quiz0', this)">A. The model isn't accurate enough</div>
    <div class="option" data-correct="true" onclick="checkQuiz('quiz0', this)">B. The infrastructure around the model — no monitoring, no auto-scaling, no rollback plan, no latency budget — was never built</div>
    <div class="option" onclick="checkQuiz('quiz0', this)">C. GPUs are too expensive to run 24/7</div>
  </div><div class="feedback" id="quiz0-fb"></div></div>
</div></div>`; }
  },

  // ═══════ SLIDE 2: 6A TensorRT ═══════
  {
    id: '6A',
    title: 'TensorRT — Optimize for Inference',
    fact: '<strong>TensorRT can make your model 15× faster</strong> by fusing layers, using FP16/INT8 precision, and auto-tuning kernels for your specific GPU. The build is slow (minutes), but inference is blazing fast (milliseconds).',
    render() { return `
<div class="slide"><div class="card">
  <h2><span class="num">6A</span> TensorRT — The Production Inference Engine</h2>

<div class="slide"><div class="card">
  <h2><span class="num">6D</span> Multi-Stream CUDA — Overlap Everything</h2>
  <p>The GPU has <strong style="color:var(--cyan)">separate engines</strong> for compute and memory copy. On the default stream, they take turns — the GPU sits idle during data transfers. Multi-stream lets them work <strong style="color:var(--green)">simultaneously</strong>.</p>

  <h3>🧵 What is a CUDA Stream?</h3>
  <p>A stream is an <strong style="color:var(--cyan)">independent queue of GPU operations</strong>. Operations within a stream run in order. Operations across DIFFERENT streams can run in parallel. The default stream (stream 0) is what you've been using — it serializes everything.</p>

  <div class="compare-grid two-col">
    <div class="compare-card pick-a"><h4>🔴 Default Stream (Sequential)</h4>
    <div class="eq-box" style="font-size:0.65rem;line-height:1.5;padding:0.6rem;margin:0.5rem 0;">
<span style="color:var(--red)">| Upload 1 | GPU IDLE | Compute 1 | GPU IDLE | Download 1 |</span>
<span style="color:var(--red)">                                            | Upload 2 | ...</span>
</div><p>Upload engine works → GPU waits. GPU computes → upload engine waits. <strong>GPU idle ~40% of the time.</strong></p></div>
    <div class="compare-card pick-c"><h4>🟢 Multi-Stream (Overlapped)</h4>
    <div class="eq-box" style="font-size:0.65rem;line-height:1.5;padding:0.6rem;margin:0.5rem 0;">
<span style="color:var(--green)">Stream 0: | Upload 1 | Compute 1 | Download 1 |</span>
<span style="color:var(--cyan)">Stream 1:     | Upload 2 | Compute 2 | Download 2 |</span>
<span style="color:var(--amber)">Stream 2:         | Upload 3 | Compute 3 | Download 3 |</span>
</div><p>While Stream 1 computes, Stream 2 uploads — <strong>GPU NEVER idle.</strong></p></div>
  </div>

  <h3>🔑 3 Requirements for Multi-Stream</h3>
  <div class="data-types">
    <div class="data-type-card"><div class="dt-icon">📌</div><h4>1. Pinned Memory</h4><p><code>cudaMallocHost()</code> not <code>malloc()</code>. Pageable memory can't do async DMA transfers. Pinned memory stays in RAM — GPU's DMA engine can access it directly.</p></div>
    <div class="data-type-card"><div class="dt-icon">🔄</div><h4>2. Async Functions</h4><p><code>cudaMemcpyAsync()</code> not <code>cudaMemcpy()</code>. The "Async" version returns immediately — the copy happens in the background while your code continues.</p></div>
    <div class="data-type-card"><div class="dt-icon">🔗</div><h4>3. Stream Assignment</h4><p><code>kernel<<<blocks, threads, 0, stream>>></code> — the 4th launch parameter assigns the kernel to a specific stream. Operations in different streams overlap.</p></div>
  </div>

  <h3>🔄 Round-Robin Stream Assignment</h3>
  <div class="eq-box">
<span style="color:var(--text-muted)">// Process 100 video frames using 4 streams:</span>
<span style="color:var(--cyan)">cudaStream_t</span> streams[<span style="color:var(--green)">4</span>];
<span style="color:var(--magenta)">for</span> (<span style="color:var(--cyan)">int</span> i = <span style="color:var(--green)">0</span>; i < <span style="color:var(--green)">4</span>; i++) cudaStreamCreate(&streams[i]);

<span style="color:var(--magenta)">for</span> (<span style="color:var(--cyan)">int</span> frame = <span style="color:var(--green)">0</span>; frame < <span style="color:var(--green)">100</span>; frame++) {
    <span style="color:var(--cyan)">int</span> s = frame % <span style="color:var(--green)">4</span>;  <span style="color:var(--text-muted)">// Round-robin across 4 streams</span>
    cudaMemcpyAsync(d_frame, h_frame, size, <span style="color:var(--green)">cudaMemcpyHostToDevice</span>, streams[s]);
    process_kernel<<<blocks, threads, <span style="color:var(--green)">0</span>, streams[s]>>>(d_frame);
    cudaMemcpyAsync(h_result, d_frame, size, <span style="color:var(--green)">cudaMemcpyDeviceToHost</span>, streams[s]);
}
<span style="color:var(--text-muted)">// Frame 1 processes in stream 0 while frame 2 uploads in stream 1!</span></div>

  const isCorrect = clickedEl.dataset.correct === 'true';
  options.forEach(o => { if (o.dataset.correct === 'true') o.classList.add('correct'); });
  if (!isCorrect) clickedEl.classList.add('wrong');
  feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  feedback.textContent = isCorrect ? '✅ Correct! Well done.' : '❌ Not quite. The correct answer is highlighted in green.';
  quiz.dataset.answered = 'true';
};

// ── Navigation ──
let currentSlide = 0;
const visitedSlides = new Set([0]);

function renderSlide(index) {
  currentSlide = index;
  visitedSlides.add(index);
  document.getElementById('slideContainer').innerHTML = slides[index].render();
  updateDots(); updateChips();
  document.getElementById('funFactText').innerHTML = '<strong>' + slides[index].id + ':</strong> ' + slides[index].fact;
  document.getElementById('stepLabel').textContent = (index + 1) + '/' + slides.length;
  document.getElementById('prevBtn').disabled = index === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (index === slides.length - 1) {
    nextBtn.textContent = '✓ Complete';
    nextBtn.style.background = 'var(--green-bg)'; nextBtn.style.borderColor = 'var(--green)'; nextBtn.style.color = 'var(--green)';
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.style.background = 'var(--cyan-bg)'; nextBtn.style.borderColor = 'var(--cyan)'; nextBtn.style.color = 'var(--cyan)';
  }
  document.getElementById('slideContainer').scrollIntoView({behavior:'smooth', block:'start'});
}

function goTo(index) { if (index >= 0 && index < slides.length) renderSlide(index); }

function updateDots() {
  document.getElementById('stepDots').innerHTML = slides.map(function(s, i) {
    var cls = i === currentSlide ? 'active' : visitedSlides.has(i) ? 'done' : '';
    return '<div class="step-dot ' + cls + '" onclick="goTo(' + i + ')" title="' + s.id + ': ' + s.title + '"></div>';
  }).join('');
}

function updateChips() {
  document.getElementById('topicChips').innerHTML = slides.map(function(s, i) {
    var cls = i === currentSlide ? 'current' : visitedSlides.has(i) ? 'visited' : '';
    return '<span class="topic-chip ' + cls + '" onclick="goTo(' + i + ')">' + s.id + ' ' + s.title + '</span>';
  }).join('');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' && currentSlide < slides.length - 1) goTo(currentSlide + 1);
  if (e.key === 'ArrowLeft' && currentSlide > 0) goTo(currentSlide - 1);
});

renderSlide(0);
</script>
</body>
