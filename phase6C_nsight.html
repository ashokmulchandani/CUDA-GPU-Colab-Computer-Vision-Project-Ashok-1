.checklist{margin:1rem 0}.checklist .check-item{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.8rem;border-bottom:1px solid var(--border);font-size:0.85rem;color:var(--tdim)}.checklist .check-box{font-size:1rem;flex-shrink:0}
.big-stat{text-align:center;margin:1rem 0}.big-stat .number{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.big-stat .label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--tmut);margin-top:0.2rem}

.nav-btn:hover{border-color:var(--cyan);color:var(--cyan)}.nav-btn:disabled{opacity:0.3;cursor:not-allowed}.nav-btn.primary{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-bg)}
.callout{background:var(--cyan-bg);border:1px solid var(--cyan-border);border-radius:8px;padding:0.7rem 1rem;margin:0.8rem 0;display:flex;align-items:center;gap:0.6rem;font-size:0.72rem;color:var(--tdim)}

function toggleTheme(){document.body.classList.toggle('light');document.getElementById('themeToggle').textContent=document.body.classList.contains('light')?'🌙':'☀️';localStorage.setItem('p6c-theme',document.body.classList.contains('light')?'light':'dark')}
if(localStorage.getItem('p6c-theme')==='light'){document.body.classList.add('light');document.getElementById('themeToggle').textContent='🌙'}
(function(){var c=document.getElementById('bgCanvas'),ctx=c.getContext('2d'),p=[];function r(){c.width=window.innerWidth;c.height=window.innerHeight}r();window.addEventListener('resize',r);for(var i=0;i<50;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,rr:Math.random()*2+0.5});function a(){ctx.clearRect(0,0,c.width,c.height);var il=document.body.classList.contains('light');var lc=il?'rgba(9,105,218,0.05)':'rgba(57,210,255,0.05)';var dc=il?'rgba(9,105,218,0.25)':'rgba(57,210,255,0.25)';p.forEach(function(pp){pp.x+=pp.vx;pp.y+=pp.vy;if(pp.x<0)pp.x=c.width;if(pp.x>c.width)pp.x=0;if(pp.y<0)pp.y=c.height;if(pp.y>c.height)pp.y=0});for(var i=0;i<p.length;i++)for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y;if(Math.sqrt(dx*dx+dy*dy)<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle=lc;ctx.lineWidth=0.5;ctx.stroke()}}p.forEach(function(pp){ctx.beginPath();ctx.arc(pp.x,pp.y,pp.rr,0,Math.PI*2);ctx.fillStyle=dc;ctx.fill()});requestAnimationFrame(a)}a()})()

const S=[{
  id:'6C.1',title:'Why Profile? — "If You Can\'t Measure It, You Can\'t Improve It"',
  fact:'<strong>Guessing why your GPU code is slow is a waste of time.</strong> Nsight tells you exactly: memory-bound or compute-bound? Which warp stalls? How much occupancy? Stop guessing, start profiling.',
  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6C.1</span> Why Profile? — "If You Can't Measure It, You Can't Improve It"</h2>
<p>Without a profiler, you're guessing. A kernel takes 10ms — is that because it's reading too much memory? Doing too much math? Launching too many blocks? <strong style="color:var(--cyan);">Nsight tells you exactly why.</strong></p>

<div class="compare-grid">
<div class="compare-card pick-a"><h4>🔴 Without Profiling</h4><p>"My kernel is slow. Maybe I should add shared memory? Or unroll loops? Or change block size? Let me try all three and see..." <strong style="color:var(--red);">Hours of trial and error.</strong></p></div>
<div class="compare-card pick-c"><h4>🟢 With Nsight</h4><p>"Nsight says I'm using 1.08% of DRAM bandwidth but 61.6% of SM throughput. I'm compute-bound, not memory-bound. Shared memory won't help — I need to reduce instruction count." <strong style="color:var(--green);">Minutes to the right fix.</strong></p></div>
</div>

<h3>🔬 Two Tools, Two Levels</h3>
<div class="data-types">
<div class="data-type-card"><div class="dt-icon">📹</div><h4>Nsight Systems</h4><p><strong>Timeline view</strong> of your ENTIRE application. See CPU threads, CUDA API calls, kernel launches, memory copies — all on one scrolling timeline. Answers: <em>"Where is the GPU idle?"</em></p></div>
<div class="data-type-card"><div class="dt-icon">🔬</div><h4>Nsight Compute</h4><p><strong>Single-kernel deep dive.</strong> Select one kernel launch and see: memory throughput, compute utilization, warp stall reasons, occupancy, register usage. Answers: <em>"Why is THIS kernel slow?"</em></p></div>
</div>

<div class="quiz" id="q0"><div class="question">🧪 You see "DRAM throughput = 1%". What does this tell you?</div>
<div class="options">
<div class="option" data-correct="true" onclick="checkQuiz('q0',this)">A. Your kernel is compute-bound — it does a lot of math for every byte of memory it reads. Optimizing memory access (shared memory, coalescing) won't help much. You need to reduce instruction count or use faster math.</div>
<div class="option" onclick="checkQuiz('q0',this)">B. Your GPU's memory is broken and needs replacement</div>
<div class="option" onclick="checkQuiz('q0',this)">C. You should add more global memory reads to increase throughput</div>
</div><div class="feedback" id="q0-fb"></div></div>
</div></div>`},{
  id:'6C.2',title:'Nsight Systems — The Timeline View',
  fact:'<strong>Nsight Systems shows you the BIG picture.</strong> CPU threads and GPU operations on one timeline. Instantly see: is the GPU waiting for the CPU? Are memory transfers serialized? Where are the gaps?',
  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6C.2</span> Nsight Systems — The Timeline View</h2>
<p>Think of it as a <strong style="color:var(--cyan);">movie recorder</strong> for your GPU application. It captures every CUDA API call, every kernel launch, every memory copy — with microsecond timestamps — and shows them as a scrolling timeline.</p>

<h3>📊 What the Timeline Looks Like</h3>
<div class="eq-box">
<span style="color:var(--text-muted);">CPU Thread:  [ Python code ][ cudaMemcpy ][ Launch Kernel ][ Python ][ cudaMemcpy ]</span>
<span style="color:var(--text-muted);">GPU Stream:  [  IDLE  ][  H→D copy  ][  KERNEL RUN  ][  IDLE  ][  D→H copy  ]</span>
<span style="color:var(--text-muted);">                                                    ↑</span>
<span style="color:var(--red);">                                          GPU IDLE = wasted time!</span>
<span style="color:var(--text-muted);">                                          (Python is preparing the next batch)</span></div>

<h3>🔍 Visual: 4 Bottleneck Patterns — Click Each to See</h3>
<div style="display:flex;gap:0.3rem;justify-content:center;flex-wrap:wrap;margin:0.5rem 0;">
  <button class="btn ns-pat active" onclick="showPattern(0,this)" style="font-size:0.45rem;">🐌 GPU Idle</button>
  <button class="btn ns-pat" onclick="showPattern(1,this)" style="font-size:0.45rem;">📋 Sequential</button>
  <button class="btn ns-pat" onclick="showPattern(2,this)" style="font-size:0.45rem;">🐜 Many Launches</button>
  <button class="btn ns-pat" onclick="showPattern(3,this)" style="font-size:0.45rem;">🔥 Kernel Heavy</button>
</div>

<div id="timelineViz" style="background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:0.8rem;margin:0.5rem 0;font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--tdim);min-height:100px;"></div>

<div id="patternExplain" style="font-size:0.6rem;color:var(--tdim);text-align:center;margin:0.3rem 0;"></div>

<div class="callout"><span style="font-size:1.1rem;">💡</span><span><strong style="color:var(--cyan);">Nsight Systems first, Nsight Compute second.</strong> Systems tells you WHICH kernel is the problem. Compute tells you WHY that kernel is slow. Never profile a kernel until you know it's the bottleneck.</span></div>

<div class="quiz" id="q1"><div class="question">You see "GPU idle 40% of the time" in the timeline. What's the most likely cause?</div>
<div class="options">
<div class="option" data-correct="true" onclick="checkQuiz('q1',this)">A. The CPU is taking too long between kernel launches — probably Python code doing preprocessing or data loading. The GPU finishes its work and waits for the CPU to give it more. Fix: pre-fetch data, use CUDA streams to overlap.</div>
<div class="option" onclick="checkQuiz('q1',this)">B. The GPU is broken and needs repair</div>
<div class="option" onclick="checkQuiz('q1',this)">C. The kernel is too computationally intensive</div>
</div><div class="feedback" id="q1-fb"></div></div>
</div></div>`},{
  id:'6C.3',title:'The Roofline Model — Memory vs Compute Bound',
  fact:'<strong>The roofline model tells you in ONE glance</strong> whether your kernel is limited by memory bandwidth or compute throughput. This determines EVERYTHING about how you optimize it.',
  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6C.3</span> The Roofline Model — Memory vs Compute Bound</h2>

<div class="eq-box">
<span style="color:var(--text-muted);">                     ↑ Peak Compute (TFLOPS)</span>
<span style="color:var(--text-muted);">Performance  ↑       ╱╲╲╲╲╲╲╲╲╲╲╲╲╲╲╲╲╲╲╲</span>
<span style="color:var(--text-muted);">(GFLOPS)     ↑     ╱                        ╲</span>
<span style="color:var(--text-muted);">             ↑   ╱    MEMORY-BOUND            ╲  COMPUTE-BOUND</span>
<span style="color:var(--text-muted);">             ↑ ╱        REGION                 ╲    REGION</span>
<span style="color:var(--text-muted);">             ↑╱__________________________________╲_______________</span>
<span style="color:var(--text-muted);">                  Operational Intensity (FLOP/byte) →</span>

<span style="color:var(--cyan);">MEMORY-BOUND:</span> Kernel spends more time waiting for data than computing.
                Fix: shared memory tiling, memory coalescing, reduce global reads.

<span style="color:var(--amber);">COMPUTE-BOUND:</span> Kernel is doing heavy math. ALUs are the bottleneck.
                 Fix: use faster math (__sinf vs sin), FP16, reduce thread divergence.</div>

<h3>🎯 Real Example: conv2d_forward from Phase 3.5</h3>
<table class="param">
<tr><th>Metric</th><th>Value</th><th>What It Means</th></tr>
<tr><td>SM Throughput</td><td style="color:var(--amber);">61.61%</td><td>Using 61% of GPU compute — decent but not great</td></tr>
<tr><td>DRAM Throughput</td><td style="color:var(--cyan);">1.08%</td><td>Barely using memory bandwidth — <strong>this kernel is compute-bound!</strong></td></tr>
<tr><td>Verdict</td><td style="color:var(--cyan);">Compute-Bound</td><td>25 multiplications per memory read. The math dominates. Optimize the math, not the memory.</td></tr>
</table>

<div class="callout"><span style="font-size:1.1rem;">💡</span><span><strong style="color:var(--amber);">The roofline is a DIAGNOSTIC, not a target.</strong> Most first-attempt CUDA kernels achieve 10-30% of peak. The naive conv2d_forward got 61.6% SM — actually quite good for a first attempt! A tiled version (with shared memory) would push SM throughput higher by reducing instruction overhead, even though it's already compute-bound.</span></div>

<div class="quiz" id="q2"><div class="question">DRAM throughput = 85%, SM throughput = 12%. What kind of kernel is this?</div>
<div class="options">
<div class="option" data-correct="true" onclick="checkQuiz('q2',this)">A. Memory-bound — it's reading/writing a LOT of data relative to the computation. Fix: use shared memory to cache data, ensure coalesced access, or increase arithmetic intensity.</div>
<div class="option" onclick="checkQuiz('q2',this)">B. Compute-bound — it needs more math operations</div>
<div class="option" onclick="checkQuiz('q2',this)">C. Perfectly optimized — high DRAM throughput is always good</div>
</div><div class="feedback" id="q2-fb"></div></div>
</div></div>`},{
  id:'6C.4',title:'Occupancy & Warp Stalls — What Limits Your Kernel',
  fact:'<strong>Low occupancy = too few warps per SM.</strong> The GPU hides memory latency by switching between warps. If you have too few active warps, the GPU sits idle waiting for memory — even if your algorithm is correct.',
  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6C.4</span> Occupancy & Warp Stalls — What Limits Your Kernel</h2>

<div class="callout"><span style="font-size:1.1rem;">🎮</span><span><strong style="color:var(--cyan);">Interactive Visualizer:</strong> Adjust threads, registers, and shared memory to see how occupancy changes — <a href="occupancy_visualizer.html" style="color:var(--cyan);">GPU Occupancy Visualizer</a>. 40 SMs × 64 warps each, click to zoom.</span></div>

<h3>🏢 Occupancy — How Full Are Your SMs?</h3>
<p>A T4 has 40 SMs. Each SM can run up to 64 warps (2,048 threads) simultaneously. <strong style="color:var(--cyan);">Occupancy = actual active warps / maximum possible warps.</strong></p>

<div class="eq-box">
<span style="color:var(--text-muted);">Example: Your kernel uses 64 registers per thread, block size = 256</span>
<span style="color:var(--text-muted);">Register limit per SM: 65,536</span>
<span style="color:var(--text-muted);">Max blocks per SM: 65,536 / (256 × 64) = 4 blocks</span>
<span style="color:var(--text-muted);">Max warps: 4 blocks × 8 warps/block = 32 warps</span>
<span style="color:var(--amber);">Occupancy = 32 / 64 = 50% ← half the GPU is idle!</span>

<span style="color:var(--text-muted);">Fix: Reduce registers (use fewer variables) OR reduce block size</span></div>

<h3>⏸️ Warp Stall Reasons — Why Are Warps Waiting?</h3>
<table class="param">
<tr><th>Stall Reason</th><th>What It Means</th><th>Fix</th></tr>
<tr><td style="color:var(--red);">Long Scoreboard</td><td>Waiting for global memory load</td><td>Shared memory tiling, coalesce reads</td></tr>
<tr><td style="color:var(--amber);">Short Scoreboard</td><td>Waiting for shared memory or L1</td><td>Reduce bank conflicts</td></tr>
<tr><td style="color:var(--amber);">Execution Dependency</td><td>Waiting for a previous instruction to finish</td><td>Increase instruction-level parallelism</td></tr>
<tr><td style="color:var(--cyan);">Not Selected</td><td>Warp is ready but scheduler picked another</td><td>Normal — means GPU is busy!</td></tr>
</table>

<div class="callout"><span style="font-size:1.1rem;">🎯</span><span><strong style="color:var(--cyan);">Our conv2d_forward (Phase 3.5):</strong> Block size = 256 threads, limited by registers (each thread needs ~40 registers for the inner loops). That's why SM throughput is 61.6% — could be higher with register optimization or loop unrolling.</span></div>

<div class="quiz" id="q3"><div class="question">Your kernel has 25% occupancy. Is this always bad?</div>
<div class="options">
<div class="option" data-correct="true" onclick="checkQuiz('q3',this)">A. Not always — low occupancy with HIGH instruction-level parallelism can still saturate the GPU. The kernel might be issuing enough instructions per thread to keep the SM busy even with fewer warps. Always check SM throughput alongside occupancy.</div>
<div class="option" onclick="checkQuiz('q3',this)">B. Yes — anything below 100% occupancy means the GPU is broken</div>
<div class="option" onclick="checkQuiz('q3',this)">C. No — lower occupancy is always better because it uses less power</div>
</div><div class="feedback" id="q3-fb"></div></div>
</div></div>`},{
