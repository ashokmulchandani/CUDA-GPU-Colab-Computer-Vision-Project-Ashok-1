<header class="header"><div class="phase-badge">⚡ PHASE 6D — MULTI-STREAM CUDA</div><h1>CUDA Streams — Overlap Everything</h1><p class="tagline">Default stream serializes everything. Custom streams overlap. 131ms → 18ms = 7.07× faster — same GPU, same kernel, just smarter execution.</p></header>

<script>
function toggleTheme(){document.body.classList.toggle('light');document.getElementById('themeToggle').textContent=document.body.classList.contains('light')?'🌙':'☀️';localStorage.setItem('p6d-theme',document.body.classList.contains('light')?'light':'dark')}
if(localStorage.getItem('p6d-theme')==='light'){document.body.classList.add('light');document.getElementById('themeToggle').textContent='🌙'}
(function(){var c=document.getElementById('bgCanvas'),ctx=c.getContext('2d'),p=[];function r(){c.width=window.innerWidth;c.height=window.innerHeight}r();window.addEventListener('resize',r);for(var i=0;i<50;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,rr:Math.random()*2+0.5});function a(){ctx.clearRect(0,0,c.width,c.height);var il=document.body.classList.contains('light');var lc=il?'rgba(9,105,218,0.05)':'rgba(57,210,255,0.05)';var dc=il?'rgba(9,105,218,0.25)':'rgba(57,210,255,0.25)';p.forEach(function(pp){pp.x+=pp.vx;pp.y+=pp.vy;if(pp.x<0)pp.x=c.width;if(pp.x>c.width)pp.x=0;if(pp.y<0)pp.y=c.height;if(pp.y>c.height)pp.y=0});for(var i=0;i<p.length;i++)for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y;if(Math.sqrt(dx*dx+dy*dy)<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle=lc;ctx.lineWidth=0.5;ctx.stroke()}}p.forEach(function(pp){ctx.beginPath();ctx.arc(pp.x,pp.y,pp.rr,0,Math.PI*2);ctx.fillStyle=dc;ctx.fill()});requestAnimationFrame(a)}a()})()

const S=[{
  id:'6D.1',title:'What Are CUDA Streams? — Independent Execution Queues',
  fact:'<strong>Without streams, your GPU is like a single-lane road.</strong> Every operation waits for the previous one. With streams, it becomes a multi-lane highway — upload, compute, and download happening simultaneously.',
  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6D.1</span> What Are CUDA Streams? — Independent Execution Queues</h2>
<p>A stream is an <strong style="color:var(--cyan);">ordered queue of GPU operations</strong>. Operations WITHIN a stream run in order. Operations in DIFFERENT streams can run <strong style="color:var(--green);">simultaneously</strong>. The GPU has separate engines for compute and memory copy — streams let them work at the same time.</p>

<div class="compare-grid">
<div class="compare-card pick-a"><h4>🔴 Default Stream (Stream 0)</h4>
<div class="eq-box" style="font-size:0.55rem;line-height:1.5;padding:0.5rem;margin:0.5rem 0;">
Upload 1 → Compute 1 → Download 1 → Upload 2 → Compute 2 → Download 2
<span style="color:var(--red);">████████████████████████████████████████████████████</span>
<span style="color:var(--red);">131.62 ms — GPU idle ~40% of the time!</span></div><p>Every operation WAITS for the previous one. Upload engine idle during compute. GPU idle during upload/download.</p></div>
<div class="compare-card pick-c"><h4>🟢 Multi-Stream (4 streams)</h4>
<div class="eq-box" style="font-size:0.55rem;line-height:1.5;padding:0.5rem;margin:0.5rem 0;">
<span style="color:var(--cyan);">S0: [Up1][Comp1][Dn1]</span>
<span style="color:var(--amber);">S1: &nbsp;&nbsp;&nbsp;[Up2][Comp2][Dn2]</span>
<span style="color:var(--magenta);">S2: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;[Up3][Comp3][Dn3]</span>
<span style="color:var(--green);">S3: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;[Up4][Comp4][Dn4]</span>
<span style="color:var(--green);">18.60 ms — GPU NEVER idle!</span></div><p>While one stream computes, another uploads — compute and copy engines work simultaneously.</p></div>
</div>

<h3>📋 Terminology — Stream, Frame, Image</h3>
<table class="param" style="margin:0.5rem auto;max-width:700px;">
<tr><th style="width:80px;">Term</th><th>What It Is</th><th>Example</th><th>How Many</th></tr>
<tr><td style="color:var(--cyan);font-weight:700;">Stream</td><td style="font-size:0.55rem;">An independent GPU work queue. Like a <strong style="color:var(--cyan);">lane on a highway</strong>. Operations in DIFFERENT streams can overlap.</td><td>Stream 0, Stream 1, Stream 2</td><td>You create 2-4 typically</td></tr>
<tr><td style="color:var(--amber);font-weight:700;">Frame</td><td style="font-size:0.55rem;">One picture from a video. <strong style="color:var(--amber);">Same thing as an image.</strong> "Frame" is video terminology, "image" is general.</td><td>Frame #42 of a video</td><td>30 per second (30 FPS)</td></tr>
<tr><td style="color:var(--green);font-weight:700;">Image</td><td style="font-size:0.55rem;">A single picture. <strong style="color:var(--green);">Same thing as a frame.</strong> The YOLO pipeline processes one image/frame at a time.</td><td>640×640 RGB picture</td><td>Same as frames</td></tr>
<tr><td style="color:var(--violet);font-weight:700;">Batch</td><td style="font-size:0.55rem;">A chunk of work split into pieces. In the benchmark: 1 batch = 10M floats. In YOLO: 1 batch = 1 image.</td><td>Batch 0 of 4 in multistream.cu</td><td>You split work into N batches</td></tr>
</table>

<div style="font-size:0.5rem;color:var(--tmut);text-align:center;margin:0.3rem 0;">
  💡 <strong style="color:var(--amber);">1 Frame = 1 Image = 1 Batch.</strong> A "batch" is just one chunk of independent work.<br>
  In the benchmark: 4 batches of 10M floats. In YOLO: 4 batches = 4 video frames.<br>
  <strong style="color:var(--cyan);">1 Stream processes 1 batch at a time.</strong> Same concept, different data.<br>
  <strong style="color:var(--green);">3 streams = 3 batches/frames in flight simultaneously.</strong>
</div>

<h3>🎬 Frame Pipeline — WITHOUT vs WITH Streams</h3>
<div style="display:flex;gap:0.3rem;justify-content:center;flex-wrap:wrap;margin:0.5rem 0;">
  <button class="btn comp-btn active" onclick="showComp(0,this)" style="font-size:0.45rem;">🔴 Without Streams</button>
  <button class="btn comp-btn" onclick="showComp(1,this)" style="font-size:0.45rem;">🟢 With 3 Streams</button>
</div>
<div id="compViz" style="background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:1rem;margin:0.5rem 0;min-height:140px;"></div>

<div style="display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;margin-top:0.5rem;">
  <div style="font-size:0.45rem;color:var(--tdim);line-height:1.8;">
    <strong style="color:var(--amber);">🎨 Colors:</strong>
    <span style="color:var(--cyan);">■ S0/Upload</span>
    <span style="color:var(--green);">■ Preprocess</span>
    <span style="color:var(--violet);">■ TRT Infer</span>
    <span style="color:var(--magenta);">■ NMS</span>
    <span style="color:var(--amber);">■ S1 lane</span>
  </div>
  <div style="font-size:0.45rem;color:var(--tdim);line-height:1.8;">
    <strong style="color:var(--amber);">🔢 How many streams?</strong>
    2-4 is the sweet spot. Too few = not enough overlap. Too many = queues fight for same GPU engines. The T4 has 1 copy engine — more than 4 streams gives diminishing returns. <strong style="color:var(--cyan);">Start with 4, profile, adjust.</strong>
  </div>
</div>

<table class="param" style="margin:0.5rem auto;max-width:650px;">
<tr><th colspan="2" style="color:var(--amber);">📦 4 Batches × 10M floats — What It Means</th></tr>
<tr><td style="color:var(--tdim);">Batch size</td><td>10,000,000 float32 numbers = <strong style="color:var(--cyan);">40 MB</strong> per batch</td></tr>
<tr><td style="color:var(--tdim);">Who decides?</td><td style="font-size:0.5rem;"><strong style="color:var(--amber);">The programmer — arbitrary choice.</strong> <code>#define N 10000000</code> in the code.<br>Chosen to be: (1) large enough that transfer time matters, (2) small enough to fit in GPU VRAM, (3) exercise PCIe bandwidth.<br>Could be 5M or 20M — the speedup is what matters, not the number.</td></tr>
<tr><td style="color:var(--tdim);">Total data</td><td>4 batches × 40 MB = <strong style="color:var(--amber);">160 MB</strong> total</td></tr>
<tr><td style="color:var(--tdim);">Where from?</td><td style="font-size:0.5rem;"><strong style="color:var(--amber);">Synthetic — fake data for benchmarking.</strong> Not real images.<br>Code fills each batch with <code>h_data[i][j] = (float)(i+1)</code> — Batch 0=all 1.0, Batch 1=all 2.0...<br>Like using dummy weights to test a conveyor belt speed.</td></tr>
<tr><td style="color:var(--tdim);">Why split?</td><td>1 big 160MB transfer = GPU waits. 4 small 40MB transfers = can overlap with compute.</td></tr>
<tr><td style="color:var(--tdim);">Kernel work</td><td>Each float: <code>val = sqrt(val*2+1)^2 + 1</code> — simple math, takes ~same time as transfer</td></tr>
<tr><td style="color:var(--tdim);">In YOLO terms</td><td>Batch = 1 image (640×640×3 = 1.2M floats = 4.8 MB). Much smaller, even faster overlap!</td></tr>
</table>


	<h3>📦 Benchmark vs YOLO — How Much Data Per Frame?</h3>

<h3>🎓 Why This Exact Example? — The Teaching Design Behind 4 × 40 MB</h3>
<div style="background:linear-gradient(135deg,var(--amber-bg),var(--magenta-bg));border:1px solid var(--amber);border-radius:var(--radius-sm);padding:0.8rem 1.2rem;margin:1rem 0;">
<div style="font-size:0.55rem;color:var(--tdim);line-height:1.8;">
This entire scenario is <strong style="color:var(--amber);">deliberately designed for learning</strong>. Every number was chosen to make the concept crystal clear:

<table class="param" style="margin:0.6rem auto;max-width:680px;">
<tr><th style="color:var(--cyan);">Design Choice</th><th style="color:var(--cyan);">Why This Value?</th><th style="color:var(--cyan);">What It Teaches</th></tr>
<tr><td style="color:var(--amber);font-weight:700;">10M floats = 40 MB</td><td style="font-size:0.5rem;"><strong>Big enough to measure, small enough to fit.</strong> At ~12 GB/s PCIe, 40 MB takes ~3ms to transfer — long enough for the timer to catch, short enough the demo runs in seconds. On a T4 (16 GB VRAM), 4 batches × 3 buffers × 40 MB = 480 MB — fits with PLENTY of room.</td><td style="font-size:0.5rem;color:var(--green);">Transfer time is VISIBLE and MEASURABLE. You can SEE the difference between sequential and overlapped.</td></tr>
<tr><td style="color:var(--amber);font-weight:700;">4 batches</td><td style="font-size:0.5rem;"><strong>Not too few, not too many.</strong> 2 batches = barely any overlap to show. 8+ batches = diminishing returns (T4 has 1 copy engine, so after 3-4 streams the copy queue just backs up). 4 batches with 4 streams = each stream handles exactly 1 batch — <strong style="color:var(--cyan);">cleanest possible demonstration.</strong></td><td style="font-size:0.5rem;color:var(--green);">Shows the GOLDILOCKS number: just enough streams to keep both the copy engine AND compute engine busy.</td></tr>
<tr><td style="color:var(--amber);font-weight:700;">Synthetic data</td><td style="font-size:0.5rem;"><strong>No I/O bottleneck confusion.</strong> Real images would add disk read time, decoding time, variable sizes. The example uses <code>h_data[i][j] = (float)(i+1)</code> — pure in-memory data. <strong style="color:var(--cyan);">Isolates ONE variable: stream vs no-stream.</strong></td><td style="font-size:0.5rem;color:var(--green);">Teaches that benchmarking should isolate the thing you're measuring. No confounding factors.</td></tr>
<tr><td style="color:var(--amber);font-weight:700;">Simple kernel</td><td style="font-size:0.5rem;"><strong>Compute time ≈ transfer time.</strong> The kernel does <code>val = sqrt(val*2+1)² + 1</code> — cheap enough that the GPU finishes computing right when the next transfer arrives. If the kernel were 100× slower, streams wouldn't help (GPU would be compute-bound). If 100× faster, the copy engine would be the bottleneck.</td><td style="font-size:0.5rem;color:var(--green);">Shows WHEN streaming helps: when compute and transfer times are BALANCED. Real pipelines (YOLO, video) often have this property naturally.</td></tr>
<tr><td style="color:var(--amber);font-weight:700;">4 streams (not 1, not 16)</td><td style="font-size:0.5rem;"><strong>Matches the batch count.</strong> With 4 batches and 4 streams, the round-robin <code>i % 4</code> assigns each batch to its OWN stream. This creates the textbook "perfect overlap" pattern. In production with continuous frames, any number of streams works — but <strong style="color:var(--cyan);">4 is the sweet spot</strong> on most GPUs (1 copy engine + enough SMs to parallelize).</td><td style="font-size:0.5rem;color:var(--green);">Demonstrates the core pattern: N streams = N lanes of simultaneous work. The code is trivially adaptable to 2, 3, or 8 streams.</td></tr>
</table>

<div style="font-size:0.55rem;color:var(--tdim);margin-top:0.5rem;text-align:center;">
<strong style="color:var(--amber);">🔑 Key Insight:</strong> This is NOT a production workload. It's a <strong style="color:var(--cyan);">microscope slide</strong> — a carefully prepared sample that makes the streaming concept visible.<br>
In production, you'd apply the SAME pattern with real data: video frames (4.8 MB each), batched API requests, multi-camera feeds.<br>
The 7.07× speedup number is real, but the REAL lesson is: <strong style="color:var(--green);">keep the GPU fed, never let it wait for data.</strong>
</div>
</div>
</div>

<h3>💻 The Multi-Stream Code</h3>
<div class="code-box"><span class="cell-num">multistream.cu — 4 streams, round-robin</span>
<span style="color:#6a9955;">// Create 4 streams</span>
<span style="color:#569cd6;">cudaStream_t</span> streams[<span style="color:#ce9178;">4</span>];
<span style="color:#569cd6;">for</span> (<span style="color:#569cd6;">int</span> i=<span style="color:#ce9178;">0</span>; i<<span style="color:#ce9178;">4</span>; i++) <span style="color:#4ec9b0;">cudaStreamCreate</span>(&streams[i]);

<span style="color:#6a9955;">// Process 4 batches — each in a DIFFERENT stream</span>
<span style="color:#569cd6;">for</span> (<span style="color:#569cd6;">int</span> i=<span style="color:#ce9178;">0</span>; i<<span style="color:#ce9178;">4</span>; i++) {
  <span style="color:#569cd6;">int</span> s = i % <span style="color:#ce9178;">4</span>;  <span style="color:#6a9955;">// Round-robin across streams</span>
  <span style="color:#4ec9b0;">cudaMemcpyAsync</span>(d[i], h[i], size, H2D, streams[s]);
  process_kernel<<<blocks, threads, <span style="color:#ce9178;">0</span>, streams[s]>>>(d[i], N);
  <span style="color:#4ec9b0;">cudaMemcpyAsync</span>(h[i], d[i], size, D2H, streams[s]);
}
<span style="color:#6a9955;">// Frame 1 computes in S0 while frame 2 uploads in S1!</span></div>

<h3>📦 What Is "Transfer"? — Moving Data Between CPU and GPU</h3>
<div style="display:flex;gap:0.5rem;justify-content:center;align-items:center;flex-wrap:wrap;margin:0.8rem 0;">
  <div style="background:var(--bg-card);border:2px solid var(--cyan);border-radius:8px;padding:0.6rem;text-align:center;min-width:120px;">

  </div>

    <div style="font-size:0.4rem;color:var(--tmut);">cudaMemcpyAsync</div>
    <div style="font-size:0.4rem;color:var(--tmut);">PCIe bus (~12 GB/s)</div>
    <div style="font-size:0.55rem;color:var(--amber);font-weight:700;margin-top:0.5rem;">← D→H Download ←</div>
    <div style="font-size:0.4rem;color:var(--tmut);">cudaMemcpyAsync</div>
    <div style="font-size:0.4rem;color:var(--tmut);">PCIe bus (~12 GB/s)</div>
  </div>

</div>
<div style="font-size:0.5rem;color:var(--tmut);text-align:center;margin:0.3rem 0;">
  💡 CPU and GPU have SEPARATE memory. Data must COPIED across the PCIe bus before the GPU can process it.<br>
  <strong style="color:var(--amber);">Without streams: copy → compute → copy → (wait) → repeat.</strong> GPU sits idle during copies.<br>
  <strong style="color:var(--green);">With streams: copy batch 1 WHILE computing batch 0.</strong> GPU never waits.
</div>

<h3>⚖️ Complete Comparison — Code, Memory, GPU Resources</h3>

<tr><th style="width:120px;">What</th><th style="color:var(--red);">❌ Without Streams</th><th style="color:var(--green);">✅ With Streams</th></tr>

<tr><td style="color:var(--amber);font-weight:700;">T4 Occupancy</td><td style="font-size:0.5rem;color:var(--red);">~1.25% (512 / 40,960 threads)<br>GPU massively underutilized</td><td style="font-size:0.5rem;color:var(--green);">~5% (2,048 / 40,960)<br>Still low — kernel is simple, 4× better</td></tr>
<tr><td style="color:var(--amber);font-weight:700;">Speedup</td><td style="font-size:0.6rem;color:var(--red);font-weight:700;">131.62 ms (1×)</td><td style="font-size:0.6rem;color:var(--green);font-weight:700;">18.60 ms (7.07×)</td></tr>
</table>

<div style="font-size:0.5rem;color:var(--tmut);text-align:center;margin:0.3rem 0;">
  💡 Streams don't change threads/block or occupancy. They change <strong style="color:var(--cyan);">WHEN work happens</strong> — overlapping transfers with compute.<br>
  The GPU has the SAME compute power in both cases. Streams just keep it BUSIER by never letting it wait for data.
</div>

	<div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:8px;padding:0.6rem 1rem;margin:0.6rem 0;">
	<div style="font-family:'Orbitron',sans-serif;font-size:0.55rem;color:var(--amber);margin-bottom:0.3rem;">🏗️ Tesla T4 SM (Streaming Multiprocessor) — What's Inside ONE SM</div>
	<div style="font-size:0.5rem;color:var(--tdim);line-height:1.8;">
	<strong>Each T4 has 40 SMs. One SM contains:</strong><br>
	&nbsp;&nbsp;🔲 <strong>64 CUDA Cores</strong> (FP32) — execute floating-point ops. 40×64 = 2,560 total.<br>
	&nbsp;&nbsp;🧮 <strong>8 Tensor Cores</strong> (FP16/INT8) — matrix multiply-accumulate. 40×8 = 320 total. Up to 65 TFLOPS FP16.<br>
	&nbsp;&nbsp;📋 <strong>65,536 Registers</strong> (256 KB) — fastest memory, private to each thread. 40×65K = 2.6M total.<br>
	&nbsp;&nbsp;💾 <strong>64 KB Shared Memory / L1 Cache</strong> — configurable split (0/64, 16/48, 32/32, 48/16, 64/0 KB).<br>
	&nbsp;&nbsp;🧵 <strong>1,024 Max Threads</strong> = 32 warps of 32 threads each. Hardware scheduler switches warps to hide latency.<br>
	&nbsp;&nbsp;📦 <strong>16 Max Blocks</strong> per SM — each block gets its own shared memory allocation.<br>
	&nbsp;&nbsp;📐 <strong>4 Texture Units</strong> — hardware-accelerated image sampling (bilinear, etc).<br>
	&nbsp;&nbsp;📤 <strong>16 Load/Store Units</strong> — handle memory requests to VRAM (GDDR6 at 320 GB/s).<br>
	&nbsp;&nbsp;📊 <strong>Warp Scheduler</strong> — 4 schedulers per SM, each can issue 1 instruction per clock to 1 warp.<br>
	<strong>Formula for max occupancy:</strong> <code style="color:var(--cyan);">Occupancy = min(Threads/1024, Blocks/16, Registers_per_thread×Threads/65536, Shared_Mem_per_block/64KB)</code>
	</div>
	</div>

	<div style="background:var(--cyan-bg);border:1px solid var(--cyan);border-radius:8px;padding:0.6rem 1rem;margin:0.6rem 0;">
	<div style="font-family:'Orbitron',sans-serif;font-size:0.55rem;color:var(--cyan);margin-bottom:0.3rem;">🔍 How to Identify Memory-Bound vs Compute-Bound</div>
	<div style="font-size:0.5rem;color:var(--tdim);line-height:1.7;">
	<strong>1. Calculate Arithmetic Intensity (AI):</strong> FLOPs ÷ Bytes moved from DRAM.<br>
	&nbsp;&nbsp;&nbsp;This kernel: ~5 FLOPs per float ÷ 8 bytes (4 read + 4 write) = <strong style="color:var(--amber);">~0.6 FLOP/byte</strong><br>
	<strong>2. Find the Roofline Ridge:</strong> Peak FLOPs ÷ Peak Memory Bandwidth.<br>
	&nbsp;&nbsp;&nbsp;T4 FP32: 8,100 GFLOPS ÷ 320 GB/s = <strong style="color:var(--cyan);">~25 FLOP/byte</strong><br>
	<strong>3. Compare:</strong> If AI &lt; 25 → <strong style="color:var(--red);">MEMORY-BOUND</strong>. If AI &gt; 25 → <strong style="color:var(--green);">COMPUTE-BOUND</strong>.<br>
	&nbsp;&nbsp;&nbsp;This kernel is ~40× below the ridge — memory bandwidth is the limiter, not compute.<br>
	<strong>4. Streams help memory-bound kernels:</strong> Overlapping PCIe transfers hides the latency. For compute-bound kernels (e.g., large matmul), streams give less benefit because the GPU is already busy computing.
	</div>
	</div>

		<div style="font-family:'Orbitron',sans-serif;font-size:0.55rem;color:var(--amber);margin-bottom:0.3rem;">🔑 The FOUR Reasons Custom CUDA + Streams Beats Python/PyTorch</div>

        '<div style="position:absolute;top:3px;left:'+Math.min(85,(phase*100+5))+'%;width:22%;height:20px;background:rgba(255,179,71,0.5);border:1px solid var(--amber);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.4rem;color:var(--text);transition:left 0.2s;">S1: F5 ⚙️</div>'+
        '<div style="position:absolute;top:3px;left:'+Math.min(85,(phase*100+28))+'%;width:22%;height:20px;background:rgba(163,113,247,0.5);border:1px solid var(--violet);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.4rem;color:var(--text);transition:left 0.2s;">S1: F4 🧠</div>'+
        '<div style="position:absolute;top:3px;left:'+Math.min(85,(phase*100+52))+'%;width:22%;height:20px;background:rgba(255,110,199,0.5);border:1px solid var(--magenta);border-radius:3px;display:flex:align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.4rem;color:var(--text);transition:left 0.2s;">S1: F3 🎯</div>'+
      '</div>'+
      '<div style="position:relative;width:90%;max-width:650px;height:26px;background:var(--raised);border-radius:4px;overflow:hidden;border:1px solid var(--magenta);">'+
        '<div style="position:absolute;top:3px;left:'+Math.min(85,(phase*100+15))+'%;width:22%;height:20px;background:rgba(163,113,247,0.5);border:1px solid var(--violet);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.4rem;color:var(--text);transition:left 0.2s;">S2: F5 🧠</div>'+
        '<div style="position:absolute;top:3px;left:'+Math.min(85,(phase*100+38))+'%;width:22%;height:20px;background:rgba(255,110,199,0.5);border:1px solid var(--magenta);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.4rem;color:var(--text);transition:left 0.2s;">S2: F4 🎯</div>'+
        '<div style="position:absolute;top:3px;left:'+Math.min(85,(phase*100+62))+'%;width:22%;height:20px;background:rgba(63,185,80,0.3);border:1px solid var(--green);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.4rem;color:var(--text);transition:left 0.2s;">S2: F3 📤</div>'+
      '</div>'+
      '<div style="font-size:0.5rem;color:var(--green);margin-top:0.5rem;">3 workers (streams), each handling a different frame at a different stage. 🔥 ~15ms for 3 frames.</div>'+
      '</div></div>';
  }
}
</script>

<script>
// ── CUDA Graph Launch Overhead Visualizer ──
function showGraphComp(i,btn){
  graphCompIdx=i;if(graphCompTimer)clearInterval(graphCompTimer);
  document.querySelectorAll('#graphCompViz').forEach(function(b){});
  var buttons=document.querySelectorAll('#slideContainer .comp-btn');
  buttons.forEach(function(b){b.classList.remove('active')});
  if(btn)btn.classList.add('active');
  renderGraphComp();
  if(i===0) graphCompTimer=setInterval(renderGraphComp,1800);
  if(i===1) graphCompTimer=setInterval(renderGraphComp,3000);
}
function renderGraphComp(){
  var graphBox=document.getElementById('graphCompViz');if(!graphBox)return;
  var t=new Date().getTime();
  if(graphCompIdx===0){
    graphBox.innerHTML='<div style="text-align:center;">'+
      '<div style="font-family:Orbitron,sans-serif;font-size:0.55rem;color:var(--red);margin-bottom:0.4rem;">🔴 Individual Launches — CPU Wastes 5μs PER kernel (20 kernels = 100μs)</div>'+
      '<div style="position:relative;width:90%;max-width:700px;height:60px;background:var(--raised);border-radius:4px;overflow:hidden;border:1px solid var(--border);margin:0 auto;">'+
      '<div style="position:absolute;top:2px;left:0;right:0;display:flex;flex-wrap:wrap;gap:1px;padding:2px;">'+
      Array.from({length:20},function(_,i){
        var alpha=((t%1800)/1800)>i*0.05?1:0.3;
        return '<div style="width:4.2%;height:24px;background:rgba(248,81,73,'+alpha+');border:1px solid var(--red);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.35rem;color:#fff;">K'+i+'</div>';
      }).join('')+
      '</div>'+
      '<div style="position:absolute;bottom:2px;left:2px;right:2px;height:14px;background:rgba(63,185,80,0.15);border:1px solid var(--green);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.4rem;color:var(--green);">GPU: EXECUTING KERNELS (actual work)</div>'+
      '</div>'+
      '<div style="font-size:0.45rem;color:var(--tdim);margin-top:0.3rem;"><strong style="color:var(--red);">CPU LAUNCH OVERHEAD:</strong> 20 kernels × 5μs = <strong style="color:var(--red);">100μs wasted</strong> just telling GPU what to do.</div>'+
      '<div style="font-size:0.45rem;color:var(--tmut);margin-top:0.2rem;">At 1000 FPS: 100μs × 1000 = <strong style="color:var(--red);">100ms CPU time burnt per second</strong> on launch overhead alone!</div>'+
      '</div>';
  } else {
    var phase=(t%3000)/3000;
    graphBox.innerHTML='<div style="text-align:center;">'+
      '<div style="font-family:Orbitron,sans-serif;font-size:0.55rem;color:var(--green);margin-bottom:0.4rem;">🟢 CUDA Graph — CPU fires ONE command (~0.5μs). GPU executes ALL kernels.</div>'+
      '<div style="display:flex;gap:0.8rem;justify-content:center;align-items:flex-end;margin:0.5rem 0;">'+
      '<div style="text-align:center;">'+
        '<div style="font-family:JetBrains Mono,monospace;font-size:0.45rem;color:var(--cyan);margin-bottom:0.2rem;">CPU</div>'+
        '<div style="width:40px;height:6px;background:var(--green);border-radius:3px;margin:0 auto;" title="~0.5μs CPU time"></div>'+
        '<div style="font-size:0.4rem;color:var(--green);margin-top:0.1rem;">0.5μs!</div>'+
      '</div>'+
      '<div style="font-size:1rem;color:var(--green);">→</div>'+
      '<div style="text-align:center;">'+
        '<div style="font-family:JetBrains Mono,monospace;font-size:0.45rem;color:var(--cyan);margin-bottom:0.2rem;">GPU</div>'+
        '<div style="position:relative;width:320px;height:40px;background:var(--raised);border:2px solid var(--green);border-radius:6px;overflow:hidden;">'+
        Array.from({length:20},function(_,i){
          return '<div style="position:absolute;left:'+((i/20)*100)+'%;width:4.5%;height:100%;background:rgba(63,185,80,'+(0.3+0.7*((phase*3000+i*10)%2000>1000?1:0.4))+');border-right:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:0.3rem;color:#fff;">'+i+'</div>';
        }).join('')+
        '</div>'+
        '<div style="font-size:0.4rem;color:var(--green);margin-top:0.1rem;">All 20 kernels executed — CPU only said "go!" once</div>'+
      '</div>'+
      '</div>'+
      '<div style="font-size:0.45rem;color:var(--tdim);margin-top:0.5rem;"><strong style="color:var(--green);">CPU LAUNCH OVERHEAD:</strong> 1 graph launch = <strong style="color:var(--green);">0.5μs</strong> — 200× less CPU time wasted!</div>'+
      '<div style="font-size:0.45rem;color:var(--tmut);margin-top:0.2rem;">At 1000 FPS: 0.5μs × 1000 = <strong style="color:var(--green);">0.5ms CPU time per second</strong>. The other 99.95% is available for real work.</div>'+
      '</div>';
  }
}
</script>
</body>
</html>
