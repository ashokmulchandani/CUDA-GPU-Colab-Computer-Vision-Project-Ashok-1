function toggleTheme(){document.body.classList.toggle('light');document.getElementById('themeToggle').textContent=document.body.classList.contains('light')?'🌙':'☀️';localStorage.setItem('p6a-theme',document.body.classList.contains('light')?'light':'dark')}

(function(){var c=document.getElementById('bgCanvas'),ctx=c.getContext('2d'),p=[];function r(){c.width=window.innerWidth;c.height=window.innerHeight}r();window.addEventListener('resize',r);for(var i=0;i<50;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,rr:Math.random()*2+0.5});function a(){ctx.clearRect(0,0,c.width,c.height);var il=document.body.classList.contains('light');var lc=il?'rgba(9,105,218,0.05)':'rgba(57,210,255,0.05)';var dc=il?'rgba(9,105,218,0.25)':'rgba(57,210,255,0.25)';p.forEach(function(pp){pp.x+=pp.vx;pp.y+=pp.vy;if(pp.x<0)pp.x=c.width;if(pp.x>c.width)pp.x=0;if(pp.y<0)pp.y=c.height;if(pp.y>c.height)pp.y=0});for(var i=0;i<p.length;i++)for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y;if(Math.sqrt(dx*dx+dy*dy)<100){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle=lc;ctx.lineWidth=0.5;ctx.stroke()}}p.forEach(function(pp){ctx.beginPath();ctx.arc(pp.x,pp.y,pp.rr,0,Math.PI*2);ctx.fillStyle=dc;ctx.fill()});requestAnimationFrame(a)}a()})()

const slides=[{
  id:'6A.1',title:'What is TensorRT? — A Compiler for Neural Networks',
  fact:'<strong>TensorRT is NOT a runtime.</strong> It is a compiler — it takes your trained model and generates optimized machine code for YOUR specific GPU. Build once, run forever.',
  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.1</span> What is TensorRT? — A Compiler for Neural Networks</h2>
<p>PyTorch is a <strong style="color:var(--amber)">training framework</strong> — flexible, Python-first, great for research. TensorRT is an <strong style="color:var(--cyan)">inference compiler</strong> — it takes your trained model and generates the fastest possible GPU code for YOUR hardware. The output is a <strong style="color:var(--green)">serialized engine file</strong> you can deploy anywhere on the same GPU model.</p>

<div class="callout"><span style="font-size:1.2rem;">📖</span><span><strong style="color:var(--cyan);">Phase 4 Reference:</strong> You already used TensorRT to optimize YOLOv8n (13.8ms → 11.3ms). See <a href="phase4_yolo_cuda.html" style="color:var(--cyan);">Phase 4 slide 4.5</a> and the <a href="tensorrt_explainer.html" style="color:var(--cyan);">TensorRT Explainer</a> for the interactive walkthrough.</span></div>

<h3>🔧 4 Optimizations TensorRT Applies</h3>
<div class="data-types">
<div class="data-type-card"><div class="dt-icon">🔗</div><h4>1. Layer Fusion</h4><p>Conv+BN+ReLU → ONE kernel. No intermediate tensor writes to global memory. 3 memory round-trips become 1. 225 layers become ~75 fused ops.</p></div>
<div class="data-type-card"><div class="dt-icon">🎯</div><h4>2. Kernel Auto-Tuning</h4><p>Tests 50+ CUDA kernel variants per layer on YOUR GPU. T4 gets different kernels than A100. Like tuning a race car for a specific track.</p></div>
<div class="data-type-card"><div class="dt-icon">📉</div><h4>3. Precision Calibration</h4><p>FP32→FP16 (2× faster, <0.1% accuracy loss). FP32→INT8 (4× faster, <0.5% loss with calibration). Tensor Cores love low precision.</p></div>
<div class="data-type-card"><div class="dt-icon">🗑️</div><h4>4. Dead Code Elimination</h4><p>Strips training-only ops: dropout layers, loss functions, gradient computation, optimizer state. Inference doesn't need ANY of it.</p></div>
</div>

<div class="quiz" id="quiz0"><div class="question">🧪 Why can't you just use the PyTorch model for production inference?</div>
<div class="options">
<div class="option" onclick="checkQuiz('quiz0',this)">A. PyTorch models are less accurate than TensorRT engines</div>
<div class="option" data-correct="true" onclick="checkQuiz('quiz0',this)">B. PyTorch keeps training-only ops (dropout, gradients), uses FP32, launches 225 separate kernels with CPU overhead per launch, and uses generic kernels not tuned for your GPU. All of this adds up to 20-40% slower inference.</div>
<div class="option" onclick="checkQuiz('quiz0',this)">C. PyTorch cannot run on NVIDIA GPUs in production</div>
</div><div class="feedback" id="quiz0-fb"></div></div>
</div></div>`},{
  id:'6A.2',title:'The Export Pipeline — PyTorch → ONNX → TensorRT',
  fact:'<strong>ONNX is the universal translator.</strong> PyTorch speaks PyTorch. TensorRT speaks TensorRT. ONNX is the middle language they both understand — like a .pdf for neural networks.',
  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.2</span> The Export Pipeline — PyTorch → ONNX → TensorRT</h2>

<div class="pipeline">
<div class="pipeline-stage"><div class="stage-icon">🔥</div><div class="stage-name">PYTORCH</div><div class="stage-desc">yolov8n.pt<br>6.3 MB</div></div>
<span class="pipeline-arrow">→</span>
<div class="pipeline-stage"><div class="stage-icon">🔷</div><div class="stage-name">ONNX</div><div class="stage-desc">model.onnx<br>12.3 MB</div></div>
<span class="pipeline-arrow">→</span>
<div class="pipeline-stage highlight"><div class="stage-icon">🚀</div><div class="stage-name">TENSORRT</div><div class="stage-desc">model.engine<br>7.9 MB (FP16)</div></div>
</div>

<h3>🔷 What is ONNX? — The Universal Translator</h3>
<div style="display:flex;gap:1rem;flex-wrap:wrap;margin:0.8rem 0;">
<div style="flex:1;min-width:250px;background:var(--raised);border:2px solid var(--amber);border-radius:8px;padding:0.8rem;">
<div style="font-family:'Orbitron',sans-serif;font-size:0.6rem;color:var(--amber);margin-bottom:0.4rem;">ONNX = Open Neural Network Exchange</div>
<table style="width:100%;font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--tdim);line-height:1.8;">
<tr><td style="color:var(--tmut);padding-right:0.5rem;">What:</td><td>A <strong style="color:var(--cyan);">file format</strong> (not a programming language) — like .pdf for documents</td></tr>
<tr><td style="color:var(--tmut);">Format:</td><td>Protocol Buffers (protobuf) — Google's binary serialization</td></tr>
<tr><td style="color:var(--tmut);">Created:</td><td>Microsoft + Meta (Facebook), 2017</td></tr>
<tr><td style="color:var(--tmut);">Why:</td><td>Train in ANY framework, deploy in ANY runtime</td></tr>
</table>
</div>
<div style="flex:1;min-width:250px;background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:0.8rem;">
<div style="font-family:'Orbitron',sans-serif;font-size:0.55rem;color:var(--tdim);margin-bottom:0.4rem;">Framework Interop</div>
<div style="font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--tdim);line-height:2;">
<span style="color:var(--red);">PyTorch</span> → ONNX → <span style="color:var(--cyan);">TensorRT</span><br>
<span style="color:var(--red);">PyTorch</span> → ONNX → <span style="color:var(--green);">ONNX Runtime</span><br>
<span style="color:var(--amber);">TensorFlow</span> → ONNX → <span style="color:var(--violet);">OpenVINO (Intel)</span><br>
<span style="color:var(--amber);">TensorFlow</span> → ONNX → <span style="color:var(--magenta);">CoreML (Apple)</span><br>
<span style="color:var(--tmut);">Any framework → ONNX → Any runtime</span>
</div>
</div>
</div>
<div style="font-size:0.65rem;color:var(--tmut);margin-bottom:0.8rem;">💡 <strong style="color:var(--cyan);">Why 12.3 MB?</strong> PyTorch .pt (6.3MB) stores just weights. ONNX (12.3MB) stores weights + the FULL computation graph (every op, every connection) explicitly — that way ANY framework can read it without needing PyTorch.</div>

<h3>💻 Export Code (from Phase 4)</h3>
<div class="code-box"><span class="cell-num">CELL — Export YOLO to TensorRT in Colab</span>
<span style="color:#6a9955;"># Step 1: Load PyTorch model</span>

  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.3</span> Precision Modes — FP32 vs FP16 vs INT8</h2>

<div class="compare-grid">
<div class="compare-card pick-a"><h4>🔴 FP32 (Full Precision)</h4>
<p><strong>32 bits</strong> per weight — 4 bytes each.</p>

<div class="compare-card pick-b"><h4>🔵 FP16 (Half Precision)</h4>

<p style="margin-top:0.5rem;color:var(--cyan);">~11.3ms on T4</p></div>
<div class="compare-card pick-c"><h4>🟢 INT8 (8-bit Integer)</h4>
<p><strong>8 bits</strong> per weight — 1 byte each.</p>
<p style="margin-top:0.5rem">✅ 4× faster<br>⚠️ Needs calibration dataset<br>⚠️ ~0.5% accuracy loss</p>
<p style="margin-top:0.5rem;color:var(--green);">~5ms on T4</p></div>
</div>

<h3>📊 Precision Comparison Table</h3>
<table class="param">
<tr><th>Precision</th><th>Bits/Weight</th><th>Model Size</th><th>Speed</th><th>Accuracy Loss</th><th>Calibration?</th></tr>
<tr><td>FP32</td><td>32</td><td>100%</td><td>1×</td><td style="color:var(--green);">Baseline</td><td>No</td></tr>
<tr><td style="color:var(--cyan);">FP16</td><td>16</td><td>~50%</td><td>~2×</td><td style="color:var(--green);"><0.1%</td><td>No</td></tr>
<tr><td style="color:var(--green);">INT8</td><td>8</td><td>~25%</td><td>~4×</td><td style="color:var(--amber);"><0.5%</td><td style="color:var(--red);">Yes</td></tr>
</table>

<div class="callout"><span style="font-size:1.2rem;">💡</span><span><strong style="color:var(--cyan);">The sweet spot:</strong> FP16 gives you 2× speedup with virtually no accuracy loss and zero calibration effort. That is why Phase 4 used FP16 for YOLO. Start with FP16. Only go to INT8 if you NEED 4× speedup AND can tolerate a calibration step AND <0.5% accuracy drop.</span></div>

  id:'6A.4',title:'Dynamic Batching + Engine Serialization',
  fact:'<strong>Without dynamic batching, 8 simultaneous requests = 8 separate GPU calls.</strong> With dynamic batching, they combine into 1 call. Same latency, 8× throughput. Zero code changes.',
  render:()=>`
<div class="slide"><div class="card">
<h2><span class="num">6A.4</span> Dynamic Batching + Engine Serialization</h2>

<h3>📦 Dynamic Batching — Why It Matters</h3>
<p>GPUs are <strong style="color:var(--cyan)">throughput machines</strong>. Processing 1 image takes ~11ms. Processing 8 images in a batch takes... still ~11ms (GPU parallelism). Dynamic batching waits for multiple requests to arrive and batches them together automatically.</p>
<div class="eq-box">
<span style="color:var(--text-muted);">Without batching: 8 requests × 11ms each = <strong style="color:var(--red);">88ms total GPU time</strong></span>
<span style="color:var(--text-muted);">With batching (batch=8): 1 batch × 11ms = <strong style="color:var(--green);">11ms total GPU time</strong></span>
<span style="color:var(--cyan);">→ </span><strong style="color:var(--green);">8× throughput at the same per-request latency!</strong></div>

<h3>💾 Engine Serialization — Load in Milliseconds</h3>
<p>Once the TensorRT engine is built, you save it to disk. Next time, just load it — <strong style="color:var(--green);">no rebuilding needed.</strong></p>
<div class="code-box"><span class="cell-num">Serialization Example</span>
<span style="color:#6a9955;">// Build once (7 minutes)</span>
<span style="color:#569cd6;">auto</span> engine = <span style="color:#4ec9b0;">buildEngine</span>(onnxModel);

<span style="color:#6a9955;">// Save to disk</span>
<span style="color:#569cd6;">auto</span> serialized = engine-><span style="color:#c586c0;">serialize</span>();
<span style="color:#4ec9b0;">writeToFile</span>(<span style="color:#ce9178;">"model.engine"</span>, serialized);

<span style="color:#6a9955;">// Later: load in ~100ms — no rebuilding!</span>
<span style="color:#569cd6;">auto</span> engine = <span style="color:#4ec9b0;">loadEngine</span>(<span style="color:#ce9178;">"model.engine"</span>);
<span style="color:#569cd6;">auto</span> context = engine-><span style="color:#c586c0;">createExecutionContext</span>();
<span style="color:#6a9955;">// Ready for inference in milliseconds!</span></div>

<h3>⚠️ Important: Engine is GPU-Specific</h3>
<div class="callout"><span style="font-size:1.2rem;">⚠️</span><span>A TensorRT engine built on a T4 <strong style="color:var(--red);">WILL NOT WORK</strong> on an A100. Different SMs, different Tensor Cores, different optimal kernels. Rebuild on the target GPU. <strong style="color:var(--amber);">Build in CI/CD on the target GPU type.</strong></span></div>

<div class="quiz" id="quiz3"><div class="question">Why serialize the engine instead of rebuilding every time?</div>
<div class="options">
<div class="option" data-correct="true" onclick="checkQuiz('quiz3',this)">A. Build takes ~7 minutes of GPU time. Loading takes ~100ms. In production, cold start time matters — a server restart shouldn't take 7 minutes to become ready for inference.</div>
<div class="option" onclick="checkQuiz('quiz3',this)">B. Serialized engines are more accurate than rebuilt ones</div>
<div class="option" onclick="checkQuiz('quiz3',this)">C. NVIDIA charges per engine build</div>
</div><div class="feedback" id="quiz3-fb"></div></div>
</div></div>`},{
