<div class="slide"><div class="card">
<h2><span class="num">6E.1</span> Why Custom CUDA Kernels? — The 3 Python Bottlenecks</h2>
<p>In a YOLO pipeline, Python/PyTorch creates <strong style="color:var(--red);">3 hidden bottlenecks</strong> that eat your frame budget. Each one is a place where data leaves the GPU or the CPU does unnecessary work.</p>

<div class="compare-grid">
<div class="compare-card bad"><h4>🔴 Bottleneck 1: Preprocessing</h4>
<p><strong>Python: 5-10ms</strong><br>cv2.resize() on CPU → np.transpose() → torch.from_numpy() copies to GPU. <strong>3 separate memory passes + PCIe transfer.</strong> The GPU sits idle waiting for data.</p></div>
<div class="compare-card bad"><h4>🔴 Bottleneck 2: Postprocessing (NMS)</h4>
<p><strong>Python: 3-8ms</strong><br>GPU computes detections → .cpu() copies to CPU → torchvision.ops.nms() runs on CPU → results go back to GPU. <strong>GPU→CPU→GPU round-trip.</strong></p></div>
<div class="compare-card bad"><h4>🔴 Bottleneck 3: Autograd Overhead</h4>
<p><strong>Invisible tax: ~1-3ms</strong><br>PyTorch builds a computation graph for EVERY operation — even during inference when you don't need gradients. with torch.no_grad() helps but doesn't eliminate it.</p></div>
</div>

<h3>🎯 YOLO Pipeline — BEFORE vs AFTER Custom CUDA</h3>
<table class="param" style="margin:0.5rem auto;max-width:800px;">
<tr><th style="width:100px;">Stage</th><th style="color:var(--red);">🐍 Python/PyTorch</th><th style="color:var(--green);">⚡ Custom CUDA</th><th>Speedup</th></tr>
<tr><td>📥 Preprocess</td><td style="font-size:0.5rem;color:var(--red);">5-10ms (CPU cv2 + np + torch)</td><td style="font-size:0.5rem;color:var(--green);"><strong>12μs</strong> (1 fused GPU kernel)</td><td style="color:var(--amber);font-weight:700;">~419×</td></tr>
<tr><td>🧠 Inference</td><td style="font-size:0.5rem;">5-8ms (TensorRT)</td><td style="font-size:0.5rem;">4-7ms (TensorRT + CUDA Graph)</td><td>~1.2×</td></tr>
<tr><td>🎯 NMS</td><td style="font-size:0.5rem;color:var(--red);">3-8ms (CPU torchvision)</td><td style="font-size:0.5rem;color:var(--green);"><strong>0.1-0.5ms</strong> (GPU CUDA NMS)</td><td style="color:var(--amber);font-weight:700;">~30×</td></tr>
<tr style="background:rgba(63,185,80,0.06);"><td>📦 Total</td><td style="font-size:0.5rem;color:var(--red);">13-26ms (~38-77 FPS)</td><td style="font-size:0.5rem;color:var(--green);"><strong>4.1-7.5ms (~133-244 FPS)</strong></td><td style="color:var(--amber);font-weight:700;">~3×</td></tr>
</table>

<div class="slide"><div class="card">
<h2><span class="num">6E.2</span> Preprocess Kernel — Resize + Normalize + HWC→CHW Fused</h2>

<h3>🎬 Animated: Python (3 Passes) vs CUDA (1 Pass)</h3>
<div style="display:flex;gap:0.3rem;justify-content:center;flex-wrap:wrap;margin:0.5rem 0;">
  <button class="btn kern-btn active" onclick="showKernVis(0,this)" style="font-size:0.45rem;">🐍 Python: 3 Passes</button>

</div>
<div id="kernVizBox" style="background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:1rem;margin:0.5rem 0;min-height:140px;"></div>

<h3>💻 The Code</h3>
<div class="code-box"><span class="cell-num">preprocess.cu — 1 kernel, 3 operations</span>
<span style="color:#569cd6;">__global__</span> <span style="color:#569cd6;">void</span> preprocess_fused(
    <span style="color:#569cd6;">uchar4</span>* input,     <span style="color:#6a9955;">// Raw camera frame (RGBA interleaved)</span>
    <span style="color:#569cd6;">float</span>* output,     <span style="color:#6a9955;">// Normalized CHW format for TRT</span>
    <span style="color:#569cd6;">int</span> srcW, <span style="color:#569cd6;">int</span> srcH, <span style="color:#569cd6;">int</span> dstW, <span style="color:#569cd6;">int</span> dstH)
{
    <span style="color:#569cd6;">int</span> x = blockIdx.x * blockDim.x + threadIdx.x;
    <span style="color:#569cd6;">int</span> y = blockIdx.y * blockDim.y + threadIdx.y;
    <span style="color:#569cd6;">if</span> (x >= dstW || y >= dstH) <span style="color:#569cd6;">return</span>;

    <span style="color:#6a9955;">// Step 1: BILINEAR RESIZE — map output pixel to source</span>
    <span style="color:#569cd6;">float</span> sx = (x + <span style="color:#ce9178;">0.5f</span>) * srcW / dstW - <span style="color:#ce9178;">0.5f</span>;
    <span style="color:#569cd6;">float</span> sy = (y + <span style="color:#ce9178;">0.5f</span>) * srcH / dstH - <span style="color:#ce9178;">0.5f</span>;
    <span style="color:#569cd6;">int</span> x0 = floorf(sx), y0 = floorf(sy);
    <span style="color:#569cd6;">int</span> x1 = x0 + <span style="color:#ce9178;">1</span>, y1 = y0 + <span style="color:#ce9178;">1</span>;
    <span style="color:#569cd6;">float</span> fx = sx - x0, fy = sy - y0;

    <span style="color:#6a9955;">// Read 4 neighboring pixels, interpolate</span>
    <span style="color:#569cd6;">uchar4</span> p00 = input[y0 * srcW + x0];
    <span style="color:#569cd6;">uchar4</span> p10 = input[y0 * srcW + x1];
    <span style="color:#569cd6;">uchar4</span> p01 = input[y1 * srcW + x0];
    <span style="color:#569cd6;">uchar4</span> p11 = input[y1 * srcW + x1];

    <span style="color:#6a9955;">// Step 2: NORMALIZE — /255.0 in the same pass!</span>
    <span style="color:#569cd6;">float</span> r = lerp(p00.x,p10.x,p01.x,p11.x,fx,fy) / <span style="color:#ce9178;">255.0f</span>;
    <span style="color:#569cd6;">float</span> g = lerp(p00.y,p10.y,p01.y,p11.y,fx,fy) / <span style="color:#ce9178;">255.0f</span>;
    <span style="color:#569cd6;">float</span> b = lerp(p00.z,p10.z,p01.z,p11.z,fx,fy) / <span style="color:#ce9178;">255.0f</span>;

<span style="color:#569cd6;">__global__</span> <span style="color:#569cd6;">void</span> nms_kernel(<span style="color:#569cd6;">float</span>* boxes, <span style="color:#569cd6;">float</span>* scores, <span style="color:#569cd6;">int</span>* keep_flags, <span style="color:#569cd6;">int</span> N) {

  <span style="color:#569cd6;">if</span> (tid >= N) <span style="color:#569cd6;">return</span>;

  <span style="color:#569cd6;">float</span> my_score = scores[tid];
  <span style="color:#569cd6;">float</span> my_x1 = boxes[tid*4+0], my_y1 = boxes[tid*4+1];
  <span style="color:#569cd6;">float</span> my_x2 = boxes[tid*4+2], my_y2 = boxes[tid*4+3];
  <span style="color:#569cd6;">float</span> my_area = (my_x2-my_x1) * (my_y2-my_y1);

  <span style="color:#6a9955;">// Compare this box against ALL other boxes (parallel!)</span>
  <span style="color:#569cd6;">for</span> (<span style="color:#569cd6;">int</span> j = <span style="color:#ce9178;">0</span>; j < N; j++) {
    <span style="color:#569cd6;">if</span> (scores[j] > my_score || (scores[j]==my_score && j < tid)) {
      <span style="color:#569cd6;">float</span> xx1 = max(my_x1, boxes[j*4+0]);
      <span style="color:#569cd6;">float</span> yy1 = max(my_y1, boxes[j*4+1]);
      <span style="color:#569cd6;">float</span> xx2 = min(my_x2, boxes[j*4+2]);
      <span style="color:#569cd6;">float</span> yy2 = min(my_y2, boxes[j*4+3]);
      <span style="color:#569cd6;">float</span> inter = max(<span style="color:#ce9178;">0.f</span>,xx2-xx1) * max(<span style="color:#ce9178;">0.f</span>,yy2-yy1);
      <span style="color:#569cd6;">float</span> iou = inter / (my_area + (boxes[j*4+2]-boxes[j*4+0])*(boxes[j*4+3]-boxes[j*4+1]) - inter);

    }
  }
  keep_flags[tid] = <span style="color:#ce9178;">1</span>;
}

<div class="slide"><div class="card">

<div class="pipeline">
<div class="pipeline-stage highlight">🐍 Python (FastAPI)</div><div class="pipeline-arrow">→</div>
<div class="pipeline-stage highlight">🔗 pybind11</div><div class="pipeline-arrow">→</div>
<div class="pipeline-stage highlight">⚡ C++/CUDA</div><div class="pipeline-arrow">→</div>
<div class="pipeline-stage highlight">🖥️ GPU</div>
</div>

<div class="compare-grid">
<div class="compare-card bad"><h4>❌ Without pybind11</h4><p><strong>Python → subprocess → compile .cu → run.</strong> Or Python → ctypes → manual memory management. Both are fragile, slow, and error-prone. Not production-grade.</p></div>
<div class="compare-card good"><h4>✅ With pybind11</h4><p><strong>import yolo_cuda; yolo_cuda.process_frame(img).</strong> Direct Python call → C++ function → CUDA kernel. Zero-copy where possible. Type-safe. Production-ready.</p></div>
</div>

<div class="code-box"><span class="cell-num">bindings.cpp — pybind11 wrapper</span>
<span style="color:#6a9955;">// C++ side: wrap your CUDA pipeline</span>
<span style="color:#569cd6;">#include</span> <span style="color:#ce9178;">&lt;pybind11/pybind11.h&gt;</span>
<span style="color:#569cd6;">#include</span> <span style="color:#ce9178;">&lt;pybind11/numpy.h&gt;</span>
<span style="color:#569cd6;">#include</span> <span style="color:#ce9178;">"yolo_pipeline.h"</span>

<span style="color:#569cd6;">namespace</span> py = pybind11;

<span style="color:#6a9955;">// The C++ function that runs the whole GPU pipeline</span>
<span style="color:#569cd6;">std::vector</span><<span style="color:#569cd6;">float</span>> process_frame_cuda(py::array_t<<span style="color:#569cd6;">uint8_t</span>> input) {
    <span style="color:#569cd6;">auto</span> buf = input.request();  <span style="color:#6a9955;">// Zero-copy access to numpy array!</span>
    <span style="color:#569cd6;">int</span> h = buf.shape[<span style="color:#ce9178;">0</span>], w = buf.shape[<span style="color:#ce9178;">1</span>], c = buf.shape[<span style="color:#ce9178;">2</span>];

    <span style="color:#569cd6;">auto</span>* d_input = cuda_upload((<span style="color:#569cd6;">uint8_t</span>*)buf.ptr, w*h*c);

    <span style="color:#569cd6;">return</span> boxes;  <span style="color:#6a9955;">// pybind11 auto-converts vector→Python list</span>
}

<span style="color:#6a9955;">// Register the module — this becomes "import yolo_cuda" in Python!</span>
PYBIND11_MODULE(yolo_cuda, m) {
    m.doc() = <span style="color:#ce9178;">"Custom CUDA YOLO pipeline — preprocess + TRT + NMS"</span>;
    m.def(<span style="color:#ce9178;">"process_frame"</span>, &process_frame_cuda,
          <span style="color:#ce9178;">"Process a single frame: HWC uint8 numpy array → detection boxes"</span>);
}</div>

<div class="code-box"><span class="cell-num">Python side — app.py (FastAPI server)</span>
<span style="color:#6a9955;"># Install: pip install yolo_cuda  (your compiled pybind11 module)</span>

<span style="color:#569cd6;">import</span> cv2

    img = cv2.imread(image_path)  <span style="color:#6a9955;"># HWC uint8 numpy array</span>
